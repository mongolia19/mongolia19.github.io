<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mongolia19's Space - Blog & Thoughts</title>
    <meta name="description" content="Thoughts on Large Language Models, AI Agents, productivity, and developer setups.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Outfit:wght@300..900&display=swap" rel="stylesheet">
    
    <!-- Highlight.js for Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- Marked.js for Markdown Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>

    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    
    <style>
        :root {
            --bg-color: #fafafa;
            --text-color: #24292f;
            --accent-color: #0969da;
            --card-bg: #ffffff;
            --border-color: #d0d7de;
            --code-bg: #f6f8fa;
            --meta-color: #57606a;
            --font-title: 'Outfit', sans-serif;
            --font-body: 'Lora', serif;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --gradient-glow: linear-gradient(135deg, #0969da 0%, #00d2ff 100%);
        }

        [data-theme="dark"] {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --card-bg: #161b22;
            --border-color: #30363d;
            --code-bg: #1f242c;
            --meta-color: #8b949e;
            --shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
            --gradient-glow: linear-gradient(135deg, #58a6ff 0%, #00d2ff 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-body);
            line-height: 1.8;
            font-size: 1.15rem;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--gradient-glow);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: var(--font-title);
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(9, 105, 218, 0.2);
        }

        .logo {
            font-family: var(--font-title);
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--text-color);
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-color);
            font-family: var(--font-title);
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .theme-toggle:hover {
            border-color: var(--accent-color);
            background-color: rgba(9, 105, 218, 0.05);
        }

        [data-theme="dark"] .theme-toggle:hover {
            background-color: rgba(88, 166, 255, 0.05);
        }

        main {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 20px 20px 80px 20px;
            flex-grow: 1;
        }

        /* Home View (List) Styling */
        #list-view {
            animation: fadeIn 0.4s ease-out;
        }

        .hero-section {
            margin-bottom: 50px;
            padding: 40px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .hero-title {
            font-family: var(--font-title);
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 16px;
            background: var(--gradient-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-sub {
            font-size: 1.25rem;
            color: var(--meta-color);
            max-width: 600px;
        }

        /* Filter Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 16px;
            font-family: var(--font-title);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--meta-color);
            transition: var(--transition);
        }

        .filter-btn:hover, .filter-btn.active {
            color: var(--text-color);
            border-color: var(--accent-color);
            background-color: rgba(9, 105, 218, 0.05);
        }

        [data-theme="dark"] .filter-btn:hover, [data-theme="dark"] .filter-btn.active {
            background-color: rgba(88, 166, 255, 0.05);
        }

        .search-box {
            position: relative;
            max-width: 300px;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 8px 16px 8px 36px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-family: var(--font-title);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            fill: none;
            stroke: var(--meta-color);
            stroke-width: 2;
            pointer-events: none;
        }

        /* Post Grid */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 30px;
        }

        @media (max-width: 480px) {
            .posts-grid {
                grid-template-columns: 1fr;
            }
        }

        .post-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            animation: cardEntrance 0.5s ease-out;
        }

        .post-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] .post-card:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-cover {
            aspect-ratio: 16/9;
            width: 100%;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
        }

        .card-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-meta {
            font-family: var(--font-title);
            font-size: 0.85rem;
            color: var(--meta-color);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-badge {
            background-color: rgba(9, 105, 218, 0.1);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        [data-theme="dark"] .card-badge {
            background-color: rgba(88, 166, 255, 0.1);
        }

        .card-title {
            font-family: var(--font-title);
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 12px;
            color: var(--text-color);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-excerpt {
            font-size: 0.95rem;
            color: var(--meta-color);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .card-tag {
            background-color: var(--code-bg);
            border: 1px solid var(--border-color);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: var(--font-title);
            color: var(--meta-color);
        }

        /* Post Detail View Styling */
        #post-view {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-family: var(--font-title);
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            transition: var(--transition);
        }

        .back-btn:hover {
            border-color: var(--accent-color);
            background-color: rgba(9, 105, 218, 0.05);
            transform: translateX(-4px);
        }

        [data-theme="dark"] .back-btn:hover {
            background-color: rgba(88, 166, 255, 0.05);
        }

        .post-header {
            margin-bottom: 40px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .post-title {
            font-family: var(--font-title);
            font-size: 2.75rem;
            line-height: 1.2;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -1px;
            color: var(--text-color);
        }

        @media (max-width: 768px) {
            .post-title {
                font-size: 2.2rem;
            }
        }

        .post-meta {
            font-family: var(--font-title);
            color: var(--meta-color);
            font-size: 0.95rem;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .post-author {
            font-weight: 600;
            color: var(--text-color);
        }

        .cover-container {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin: 0 auto 40px auto;
            border: 1px solid var(--border-color);
            aspect-ratio: 16/9;
            max-width: 800px;
        }

        .cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Post Body Content Styling */
        .content {
            font-size: 1.15rem;
            color: var(--text-color);
            max-width: 800px;
            margin: 0 auto;
        }

        .content h1, .content h2, .content h3, .content h4 {
            font-family: var(--font-title);
            font-weight: 700;
            margin-top: 40px;
            margin-bottom: 16px;
            line-height: 1.25;
            color: var(--text-color);
        }

        .content h1 { font-size: 2.2rem; }
        .content h2 { font-size: 1.8rem; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .content h3 { font-size: 1.4rem; }

        .content p {
            margin-bottom: 24px;
        }

        .content a {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1.5px solid transparent;
            transition: var(--transition);
        }

        .content a:hover {
            border-bottom-color: var(--accent-color);
        }

        .content ul, .content ol {
            margin-bottom: 24px;
            padding-left: 24px;
        }

        .content li {
            margin-bottom: 8px;
        }

        .content code {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            background-color: var(--code-bg);
            padding: 3px 6px;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .content pre {
            background-color: #1f242c;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .content pre code {
            background-color: transparent;
            padding: 0;
            color: #e6edf3;
            font-size: 0.95rem;
        }

        .content blockquote {
            border-left: 4px solid var(--accent-color);
            padding-left: 20px;
            color: var(--meta-color);
            font-style: italic;
            margin-bottom: 24px;
        }

        .content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 40px 0;
        }

        .content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }

        .content th, .content td {
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            text-align: left;
        }

        .content th {
            background-color: var(--code-bg);
            font-family: var(--font-title);
            font-weight: 600;
        }

        footer {
            border-top: 1px solid var(--border-color);
            padding: 40px 20px;
            text-align: center;
            font-family: var(--font-title);
            font-size: 0.9rem;
            color: var(--meta-color);
            background-color: var(--card-bg);
            transition: var(--transition);
            margin-top: auto;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        .sun-icon, .moon-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container" onclick="navigateHome()">
            <div class="logo-icon">M</div>
            <a href="#" class="logo" onclick="event.preventDefault()">mongolia19's space</a>
        </div>
        <div class="header-actions">
            <button class="theme-toggle" id="theme-btn" aria-label="Toggle dark mode">
                <span id="theme-text">Dark Mode</span>
            </button>
        </div>
    </header>

    <main>
        <!-- Home / Post List View -->
        <section id="list-view">
            <div class="hero-section">
                <h1 class="hero-title">Thoughts & Logs</h1>
                <p class="hero-sub">Deep dives into LLM Agents, system design, developer configurations, and productivity hacks.</p>
            </div>

            <div class="controls">
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterLanguage('all', this)">All</button>
                    <button class="filter-btn" onclick="filterLanguage('en', this)">English</button>
                    <button class="filter-btn" onclick="filterLanguage('cn', this)">中文</button>
                </div>
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" class="search-input" id="search-bar" placeholder="Search articles..." oninput="handleSearch()">
                </div>
            </div>

            <div class="posts-grid" id="posts-container">
                <!-- Dynamically populated cards -->
            </div>
        </section>

        <!-- Post Detail View -->
        <section id="post-view">
            <button class="back-btn" onclick="navigateHome()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Articles
            </button>
            
            <div class="post-header">
                <h1 class="post-title" id="post-title">Loading post title...</h1>
                <div class="post-meta">
                    <span class="post-author">By mongolia19</span>
                    <span>•</span>
                    <span class="post-date" id="post-date">July 1, 2026</span>
                </div>
            </div>

            <div class="cover-container" id="post-cover-wrapper">
                <img src="" alt="Blog post cover" class="cover-image" id="post-cover">
            </div>

            <div class="content" id="markdown-content">
                <!-- Rendered Markdown content -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 mongolia19. Built with passion & AI.</p>
    </footer>

    <script>
        // Set up marked options
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        let allPosts = [];
        let activeLang = 'all';
        let searchQuery = '';

        // Initial Load
        window.addEventListener('DOMContentLoaded', async () => {
            await fetchPosts();
            handleRouting();
        });

        // Listen for history back/forward
        window.addEventListener('popstate', handleRouting);

        async function fetchPosts() {
            try {
                const res = await fetch('posts.json');
                allPosts = await res.json();
            } catch (err) {
                console.error("Error loading posts.json:", err);
                document.getElementById('posts-container').innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--meta-color);">Error loading articles database.</p>`;
            }
        }

        function handleRouting() {
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('post');
            
            if (postId) {
                renderPost(postId);
            } else {
                renderList();
            }
        }

        function renderList() {
            document.getElementById('post-view').style.display = 'none';
            document.getElementById('list-view').style.display = 'block';
            document.title = "mongolia19's Space - Blog & Thoughts";
            
            const container = document.getElementById('posts-container');
            container.innerHTML = '';
            
            const filtered = allPosts.filter(post => {
                const matchesLang = activeLang === 'all' || post.lang === activeLang;
                const matchesSearch = post.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      post.summary.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                      (post.tags && post.tags.some(t => t.toLowerCase().includes(searchQuery.toLowerCase())));
                return matchesLang && matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--meta-color); padding: 40px;">No articles found matching the filters.</p>`;
                return;
            }

            filtered.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.onclick = () => viewPost(post.id);
                
                const tagsHtml = post.tags ? post.tags.map(t => `<span class="card-tag">${t}</span>`).join('') : '';
                
                card.innerHTML = `
                    <img src="${post.cover}" alt="${post.title}" class="card-cover">
                    <div class="card-body">
                        <div class="card-meta">
                            <span>${post.date}</span>
                            <span class="card-badge">${post.lang === 'cn' ? '中文' : 'English'}</span>
                        </div>
                        <h2 class="card-title">${post.title}</h2>
                        <p class="card-excerpt">${post.summary}</p>
                        <div class="card-tags">${tagsHtml}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function renderPost(id) {
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('post-view').style.display = 'block';
            
            const post = allPosts.find(p => p.id === id);
            if (!post) {
                document.getElementById('post-title').innerText = "Post Not Found";
                document.getElementById('markdown-content').innerHTML = "<p>The article you are looking for does not exist.</p>";
                document.getElementById('post-cover-wrapper').style.display = 'none';
                return;
            }

            document.title = `${post.title} | mongolia19`;
            document.getElementById('post-title').innerText = post.title;
            document.getElementById('post-date').innerText = post.date;
            
            if (post.cover) {
                document.getElementById('post-cover').src = post.cover;
                document.getElementById('post-cover-wrapper').style.display = 'block';
            } else {
                document.getElementById('post-cover-wrapper').style.display = 'none';
            }

            const mdContent = document.getElementById('markdown-content');
            mdContent.innerHTML = "<p style='color: var(--meta-color);'>Loading article content...</p>";

            try {
                const res = await fetch(post.file);
                if (!res.ok) throw new Error("File not found");
                const markdown = await res.text();
                
                // Remove initial heading if it exists in markdown to avoid double titles
                const cleanMd = markdown.replace(/^#\s+.+?\n/, '');

                // --- Math protection: replace $...$ and $$...$$ with placeholders
                // so marked.js doesn't corrupt LaTeX syntax (e.g. escaping underscores)
                const mathBlocks = [];
                const protected1 = cleanMd
                    // Display math $$...$$  (must come before inline)
                    .replace(/\$\$([\s\S]+?)\$\$/g, (_, expr) => {
                        mathBlocks.push({ type: 'display', expr });
                        return `MATHBLOCK_${mathBlocks.length - 1}_END`;
                    })
                    // Inline math $...$
                    .replace(/\$([^\$\n]+?)\$/g, (_, expr) => {
                        mathBlocks.push({ type: 'inline', expr });
                        return `MATHBLOCK_${mathBlocks.length - 1}_END`;
                    });

                // Parse markdown (math is safely hidden as placeholders)
                let html = marked.parse(protected1);

                // Restore math blocks as KaTeX-rendered HTML
                html = html.replace(/MATHBLOCK_(\d+)_END/g, (_, i) => {
                    const { type, expr } = mathBlocks[parseInt(i)];
                    try {
                        return katex.renderToString(expr.trim(), {
                            displayMode: type === 'display',
                            throwOnError: false
                        });
                    } catch (e) {
                        return type === 'display' ? `$$${expr}$$` : `$${expr}$`;
                    }
                });

                mdContent.innerHTML = html;
                
                // Highlight syntax
                document.querySelectorAll('pre code').forEach((el) => {
                    hljs.highlightElement(el);
                });
                
                // Scroll to top
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                console.error("Error fetching markdown file:", err);
                mdContent.innerHTML = `<p style="color: red;">Failed to load the article content. Check if the file is correctly placed in your repository.</p>`;
            }
        }

        // Navigation actions
        function viewPost(id) {
            window.history.pushState({}, '', `?post=${id}`);
            handleRouting();
        }

        function navigateHome() {
            window.history.pushState({}, '', window.location.pathname);
            handleRouting();
        }

        // Search & Filter controls
        function filterLanguage(lang, btn) {
            activeLang = lang;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderList();
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-bar').value;
            renderList();
        }

        // Theme Toggle Logic
        const themeBtn = document.getElementById('theme-btn');
        const themeText = document.getElementById('theme-text');
        
        const sunSvg = `
            <svg class="sun-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        `;

        const moonSvg = `
            <svg class="moon-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        `;

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            if (theme === 'dark') {
                themeBtn.innerHTML = sunSvg + '<span>Light Mode</span>';
            } else {
                themeBtn.innerHTML = moonSvg + '<span>Dark Mode</span>';
            }
        }

        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme) {
            setTheme(savedTheme);
        } else if (systemPrefersDark) {
            setTheme('dark');
        } else {
            setTheme('light');
        }

        themeBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });
    </script>
</body>
</html>
